version: 2

project_name: passgen

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/passgen
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

changelog:
  sort: asc
  groups:
    - title: "Breaking Changes"
      regexp: '^.*!:|BREAKING CHANGE'
      order: 0
    - title: "Features"
      regexp: '^feat'
      order: 1
    - title: "Bug Fixes"
      regexp: '^fix'
      order: 2
    - title: "Refactoring"
      regexp: '^refactor'
      order: 3
    - title: "Other"
      order: 999
  filters:
    exclude:
      - '^docs:'

release:
  github:
    owner: esavenko
    name: passgen